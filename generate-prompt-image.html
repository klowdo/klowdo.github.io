<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Prompt Image</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #313244;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .terminal {
      background: #1e1e2e;
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      line-height: 1.5;
      padding: 16px 24px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .green  { color: #a6e3a1; font-weight: 700; }
    .blue   { color: #89b4fa; font-weight: 700; }
    .mauve  { color: #cba6f7; font-weight: 700; }
    .text   { color: #cdd6f4; font-weight: 400; }
  </style>
</head>
<body>
  <div class="terminal">
    <span class="green">klowdo</span><span class="text">@</span><span class="blue">flixen.se</span><span class="text">:</span><span class="mauve">~</span><span class="text">$ make dev-start</span>
  </div>
</body>
</html>
